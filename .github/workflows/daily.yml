name: Amalaya Bot Daily

on:
  schedule:
    - cron: "0 12 * * *"  # 7:00 AM Colombia (UTC-5) = 12:00 UTC
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests feedparser beautifulsoup4

      - name: Run bot
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASS: ${{ secrets.WP_APP_PASS }}
          WP_POST_STATUS: ${{ secrets.WP_POST_STATUS }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          POSTS_PER_RUN: ${{ secrets.POSTS_PER_RUN }}
          MIN_PARAGRAPHS: ${{ secrets.MIN_PARAGRAPHS }}
        run: |
          python bot.py
