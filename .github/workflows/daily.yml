name: Amalaya Bot Daily

on:
  schedule:
    - cron: "0 12 * * *"  # 7:00 AM Colombia (UTC-5) = 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests feedparser beautifulsoup4

      - name: Run bot
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASSWORD: ${{ secrets.WP_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          python bot.py

      - name: Keep repo alive
        run: |
          git config user.email "bot@amalaya.com.co"
          git config user.name "AmalayaBot"
          git add state.json || true
          git diff --cached --quiet || git commit -m "chore: state update [skip ci]"
          git push || true
